<!doctype html>
<html>
  <head>
    <title>Student Management System</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 600px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #2a5298;
      }

      input {
        padding: 10px;
        margin: 5px;
        width: 40%;
        border-radius: 6px;
        border: 1px solid #ccc;
      }

      button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        color: white;
      }

      .add-btn {
        background: #2a5298;
      }
      .edit-btn {
        background: #f39c12;
      }
      .delete-btn {
        background: #e74c3c;
      }

      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #ddd;
      }

      th {
        background: #2a5298;
        color: white;
      }

      tr:hover {
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Student Management System</h2>
      <h3 id="studentInfo"></h3>

      <input id="name" placeholder="Enter Name" />
      <input id="age" placeholder="Enter Age" />
      <button class="add-btn" onclick="addStudent()">Add Student</button>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <script>
      const API = "http://backend:8081/students";

      async function addStudent() {
        const name = document.getElementById("name").value;
        const age = document.getElementById("age").value;

        if (!name || !age) {
          alert("Please fill all fields");
          return;
        }

        await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, age }),
        });

        document.getElementById("name").value = "";
        document.getElementById("age").value = "";
        loadStudents();
      }

      async function deleteStudent(id) {
        await fetch(API + "/" + id, { method: "DELETE" });
        loadStudents();
      }

      async function editStudent(id, oldName, oldAge) {
        const newName = prompt("Edit Name:", oldName);
        const newAge = prompt("Edit Age:", oldAge);

        if (newName && newAge) {
          await fetch(API + "/" + id, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: newName, age: newAge }),
          });
          loadStudents();
        }
      }

      async function loadStudents() {
        const res = await fetch(API);
        const data = await res.json();

        document.getElementById("tableBody").innerHTML = data
          .map(
            (s) => `
      <tr>
        <td>${s.name}</td>
        <td>${s.age}</td>
        <td>
          <button class="edit-btn" onclick="editStudent('${s._id}', '${s.name}', '${s.age}')">Edit</button>
          <button class="delete-btn" onclick="deleteStudent('${s._id}')">Delete</button>
        </td>
      </tr>
    `,
          )
          .join("");
      }

      async function loadStudentDetails() {
        const res = await fetch("http://backend:8081/student-details");
        const data = await res.json();

        document.getElementById("studentInfo").innerText =
          `Name: ${data.name} | Roll: ${data.roll} | Register: ${data.register}`;
      }

      loadStudents();
      loadStudentDetails();
    </script>
  </body>
</html>
